services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: causa-backend
    # Override command for development to enable hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    environment:
      - WATCHFILES_FORCE_POLLING=true # Often needed for hot reload in Docker on some systems
    # Neo4j is cloud-hosted (AuraDB)
    # See backend/.env for connection details
